<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#07070C">
  <!-- index.html selbst nie cachen — Skripte hängen am ?v=TOUR_VERSION -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>AllesDa &mdash; Tour</title>
  <script>
    // Hell/Dunkel VOR dem ersten Rendern bestimmen (kein Dunkel-Blitz):
    // Pitch-Übergabe (localStorage) → sonst Systemeinstellung.
    (function () {
      var v = null;
      try { v = localStorage.getItem("allesda:tour:modus"); } catch (e) {}
      var hell = v === "hell" || (v !== "dunkel" &&
        !(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches));
      if (hell) document.documentElement.setAttribute("data-hell", "1");
    })();
  </script>
  <style>
    html, body {
      margin: 0; padding: 0;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
    }
    body {
      background: #07070C; color: #F0F0FF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      min-height: 100dvh;
    }
    #ladeIndikator {
      position: fixed; top: 0; right: 0; bottom: 0; left: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #07070C; color: #F0F0FF;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #ladeIndikator .spinner {
      width: 36px; height: 36px;
      border: 3px solid #252540;
      border-top-color: #0E7490;
      border-radius: 50%;
      animation: ad-spin 0.8s linear infinite;
    }
    @keyframes ad-spin { to { transform: rotate(360deg); } }
    /* Hell-Modus (data-hell auf <html>, gesetzt vom Modus-Skript oben) */
    html[data-hell] body { background: #ECEEF3; color: #0F1022; }
    html[data-hell] #ladeIndikator { background: #ECEEF3; color: #0F1022; }
    html[data-hell] #ladeIndikator .spinner { border-color: #D8DCE8; border-top-color: #0E7490; }
    html[data-hell] #ladeIndikator .sub { color: #737896; }
    #ladeIndikator .titel {
      margin-top: 18px;
      font-size: 15px; font-weight: 600;
      letter-spacing: -0.02em;
    }
    #ladeIndikator .titel .akzent { color: #0E7490; }
    #ladeIndikator .sub {
      margin-top: 6px;
      font-size: 11px; color: #7575A0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <div id="ladeIndikator">
    <div class="spinner"></div>
    <div class="titel">Alles<span class="akzent">Da</span> &mdash; Tour</div>
    <div class="sub"><span>Demo wird vorbereitet &hellip;</span></div>
  </div>

  <!-- Reihenfolge wichtig: Inhalte → Seed (lädt danach AllesDa.js) → Tour -->
  <script>
    // Skripte mit Versions-Cache-Buster nachladen: inhalte.js zuerst (liefert
    // TOUR_VERSION), dann seed.js + tour.js mit ?v=TOUR_VERSION.
    (function () {
      var s0 = document.createElement("script");
      s0.src = "inhalte.js?nc=" + Date.now();
      s0.onload = function () {
        var v = (typeof TOUR_VERSION !== "undefined") ? TOUR_VERSION : String(Date.now());
        var s1 = document.createElement("script");
        s1.src = "seed.js?v=" + encodeURIComponent(v);
        s1.onload = function () {
          var s2 = document.createElement("script");
          s2.src = "tour.js?v=" + encodeURIComponent(v);
          document.body.appendChild(s2);
        };
        document.body.appendChild(s1);
      };
      document.body.appendChild(s0);
    })();
  </script>
</body>
</html>
